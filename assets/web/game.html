<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BlockQuest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }

        /* Virtual Joystick */
        #joystick-zone {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 40%;
            height: 50%;
            z-index: 10;
        }
        #joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            left: 30px;
            bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #joystick-thumb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            pointer-events: none;
        }

        /* Action Buttons */
        #action-buttons {
            position: fixed;
            right: 20px;
            bottom: 30px;
            z-index: 10;
            display: flex;
            gap: 15px;
        }
        .action-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .action-btn:active {
            background: rgba(255,255,255,0.35);
        }

        /* Crosshair */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            z-index: 5;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.6);
        }
        #crosshair::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
        #crosshair::after {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 10;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        #health-bar {
            display: flex;
            gap: 4px;
            margin-top: 5px;
        }
        .heart {
            font-size: 20px;
        }
        #level-info {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 10;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-align: right;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        #objective {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #FFD700;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            font-family: 'Courier New', monospace;
        }
        #loading h1 {
            font-size: 28px;
            color: #FFD700;
            margin-bottom: 20px;
        }
        #loading-bar {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }
        #loading-fill {
            width: 0%;
            height: 100%;
            background: #FFD700;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <h1>⚔️ BlockQuest</h1>
        <p>Loading level...</p>
        <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="health-bar">
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
        </div>
        <div id="items-collected" style="margin-top:5px;">💎 0 / 0</div>
    </div>
    <div id="level-info">
        <div id="level-name">Level 1</div>
        <div id="world-name">Enchanted Forest</div>
    </div>
    <div id="objective"></div>

    <!-- Crosshair -->
    <div id="crosshair"></div>

    <!-- Controls -->
    <div id="joystick-zone">
        <div id="joystick-base">
            <div id="joystick-thumb"></div>
        </div>
    </div>
    <div id="action-buttons">
        <div class="action-btn" id="btn-jump">JUMP</div>
        <div class="action-btn" id="btn-action">⚔️</div>
    </div>

    <!-- Three.js + Game Scripts -->
    <script src="js/three.min.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/world.js"></script>
    <script src="js/player.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
